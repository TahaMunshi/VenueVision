databases:
  - name: venuevision-db
    plan: free
    databaseName: fyp_db

services:
  - type: web
    name: venuevision
    plan: free
    runtime: docker
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: venuevision-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
