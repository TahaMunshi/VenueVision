<!DOCTYPE html>
<html>
<head>
    <title>New 3D Asset Uploader</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        input[type="file"] { font-size: 16px; }
        button { font-size: 18px; padding: 12px; margin-top: 20px; width: 100%; }
        #message { font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>New 3D Asset Uploader</h2>
    <p>Upload multiple (10-20) photos of your object (e.g., a chair) from all angles.</p>
    
    <input type="file" id="imageInput" accept="image/jpeg, image/png, image/jpg" multiple>
    
    <button id="processButton">Generate 3D Asset</button>
    <div id="message"></div>
    
    <hr>
    <a href="/asset_viewer.html" target="_blank">
        <button style="background-color: #4CAF50; color: white;">View Generated Asset</button>
    </a>
    <a href="/uploader.html" style="text-decoration: none;">
        <button style="font-size: 14px; background-color: #f0f0f0; color: #333;">Back to Wall Uploader</button>
    </a>

    <script>
        const fileInput = document.getElementById('imageInput');
        const processButton = document.getElementById('processButton');
        const message = document.getElementById('message');

        processButton.addEventListener('click', async () => {
            const files = fileInput.files;
            if (!files || files.length < 5) {
                message.innerText = 'Error: Please select at least 5 images.';
                return;
            }

            message.innerText = 'Uploading and processing... This may take several minutes...';
            
            const formData = new FormData();
            for (const file of files) {
                formData.append('images', file);
            }

            try {
                // Send the data to our NEW Python endpoint
                const response = await fetch('http://localhost:5000/process_asset', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();

                if (result.status === 'success') {
                    message.innerText = `Success! New asset saved as ${result.filename}. You can now click 'View Generated Asset'.`;
                } else {
                    message.innerText = `Error: ${result.message}`;
                }
            } catch (error) {
                message.innerText = 'Error: Could not connect to Python server.';
                console.error(error);
            }
        });
    </script>
</body>
</html>
