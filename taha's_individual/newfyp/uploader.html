<!DOCTYPE html>
<html>
<head>
    <title>Wall Texture Uploader</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; }
        #controls { padding: 20px; width: 300px; }
        #canvas-container { border: 2px dashed #ccc; flex-grow: 1; display: flex; justify-content: center; align-items: center;}
        canvas { max-width: 100%; max-height: 80vh; }
        button { font-size: 16px; padding: 10px; margin-top: 10px; width: 100%; }
        #message { font-weight: bold; margin-top: 15px; }
        .bg-yellow-500 { background-color: #f6e05e; }
        .bg-green-500 { background-color: #4CAF50; }
        .text-black { color: #000; }
    </style>
</head>
<body>
    <div id="controls">
        <h2>Wall Texture Uploader</h2>
        <p>Upload the 4 wall photos (North, East, South, West) to process them into stylized textures.</p>
        
        <!-- 1. File Upload -->
        <input type="file" id="imageInput" accept="image/jpeg, image/png, image/jpg">
        <hr>
        
        <!-- 2. Wall Selection -->
        <label for="wallSelect"><b>Processing for wall:</b></label>
        <select id="wallSelect" style="width:100%; padding: 5px;">
            <option value="1_north">1. North Wall (Back)</option>
            <option value="2_east">2. East Wall (Right)</option>
            <option value="3_south">3. South Wall (Front)</option>
            <option value="4_west">4. West Wall (Left)</option>
        </select>
        
        <!-- 3. Instructions & Points List -->
        <p id="instructions" style="display:none;">
            <b>Manual Crop Order:</b>
            <ol>
                <li>Top-Left</li>
                <li>Top-Right</li>
                <li>Bottom-Right</li>
                <li>Bottom-Left</li>
            </ol>
        </p>
        <ul id="pointList"></ul>
        
        <!-- 4. Action Buttons (Updated) -->
        <button id="autoDetectButton" class="bg-yellow-500 text-black">Auto-Detect Corners (CamScanner)</button>
        <button id="confirmButton" style="display:none;" class="bg-green-500 text-black">Confirm & Process Wall</button>
        <button id="manualCropButton" style="display:none;">Use Manual Crop</button>
        <button id="resetButton" style="display:none;">Reset Clicks</button>
        <div id="message"></div>
        
        <hr>
        <a href="/index.html" target="_blank">
            <button style="background-color: #4CAF50; color: white;">View 3D Room Resizer</button>
        </a>
    </div>

    <div id="canvas-container">
        <canvas id="myCanvas"></canvas>
    </div>

    <script>
        const fileInput = document.getElementById('imageInput');
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        const instructions = document.getElementById('instructions');
        const confirmButton = document.getElementById('confirmButton');
        const manualCropButton = document.getElementById('manualCropButton');
        const resetButton = document.getElementById('resetButton');
        const autoDetectButton = document.getElementById('autoDetectButton');
        const wallSelect = document.getElementById('wallSelect');
        const pointList = document.getElementById('pointList');
        const message = document.getElementById('message');

        let originalImage = null;
        let points = []; 
        let currentFile = null;

        // Dragging State
        let isDragging = false;
        let dragIndex = -1;
        const DRAG_RADIUS = 30; // How close (pixels) you must be to grab a corner

        // --- VISUALIZATION ---
        function drawImage() {
            if (originalImage) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
            }
        }

        function drawPoints() {
            drawImage(); // Always clear and redraw image first

            // 1. Draw the Polygon Outline
            if (points.length >= 2) {
                ctx.strokeStyle = 'rgba(0, 255, 0, 0.8)'; // Bright Green
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(points[0][0], points[0][1]);
                for(let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i][0], points[i][1]);
                }
                if (points.length === 4) {
                    ctx.closePath();
                }
                ctx.stroke();
            }

            // 2. Draw "Handles" (Circles) at every point so user knows they are draggable
            ctx.fillStyle = 'rgba(255, 0, 0, 0.7)'; // Red Handles
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            
            points.forEach((pt, index) => {
                ctx.beginPath();
                ctx.arc(pt[0], pt[1], 15, 0, 2 * Math.PI); // Radius 15
                ctx.fill();
                ctx.stroke();
                
                // Optional: Number the corners to help user orientation
                ctx.fillStyle = "white";
                ctx.font = "20px Arial";
                ctx.fillText(index + 1, pt[0] - 5, pt[1] + 5);
                ctx.fillStyle = 'rgba(255, 0, 0, 0.7)'; // Reset for next circle
            });

            updatePointListUI();
        }

        function updatePointListUI() {
            pointList.innerHTML = '';
            points.forEach((pt, i) => {
                pointList.innerHTML += `<li>Corner ${i+1}: [${Math.round(pt[0])}, ${Math.round(pt[1])}]</li>`;
            });
        }

        // --- IMAGE LOADING ---
        fileInput.addEventListener('change', (e) => {
            currentFile = e.target.files[0];
            if (!currentFile) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage = new Image();
                originalImage.onload = () => {
                    // Set canvas to match image resolution exactly
                    canvas.width = originalImage.width;
                    canvas.height = originalImage.height;
                    drawImage();
                    
                    instructions.style.display = 'block';
                    autoDetectButton.style.display = 'block';
                    resetButton.style.display = 'block';
                    message.innerText = 'Upload complete. Auto-detect or click manually.';
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(currentFile);
            resetPoints();
        });

        // --- MOUSE INTERACTION (CLICK & DRAG) ---
        
        // Helper: Get Mouse Position relative to Canvas Scale
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        canvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(e);

            // 1. Check if we are clicking on an existing point (to drag it)
            for (let i = 0; i < points.length; i++) {
                const dx = pos.x - points[i][0];
                const dy = pos.y - points[i][1];
                // Check distance (Pythagoras)
                if (Math.sqrt(dx*dx + dy*dy) < DRAG_RADIUS) {
                    isDragging = true;
                    dragIndex = i;
                    return; // Stop here, we are dragging, not adding
                }
            }

            // 2. If not dragging, and we don't have 4 points yet, ADD a new point
            if (points.length < 4) {
                points.push([pos.x, pos.y]);
                drawPoints();
                checkCompletion();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging && dragIndex !== -1) {
                const pos = getMousePos(e);
                // Update the dragged point coordinates
                points[dragIndex] = [pos.x, pos.y];
                drawPoints(); // Redraw immediately
            } else {
                // Optional: Change cursor if hovering over a point
                const pos = getMousePos(e);
                let hovering = false;
                for (let i = 0; i < points.length; i++) {
                    const dx = pos.x - points[i][0];
                    const dy = pos.y - points[i][1];
                    if (Math.sqrt(dx*dx + dy*dy) < DRAG_RADIUS) {
                        hovering = true; 
                        break;
                    }
                }
                canvas.style.cursor = hovering ? 'grab' : 'crosshair';
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            dragIndex = -1;
        });

        // --- BUTTON LOGIC ---
        
        function checkCompletion() {
            if (points.length === 4) {
                confirmButton.style.display = 'block';
                autoDetectButton.style.display = 'none';
                message.innerText = 'Region selected. Drag corners to adjust, then Confirm.';
            }
        }

        autoDetectButton.addEventListener('click', async () => {
            if (!currentFile) return;
            message.innerText = 'Auto-detecting...';
            
            const formData = new FormData();
            formData.append('image', currentFile);
            formData.append('wall_name', wallSelect.value);
            formData.append('points_mode', 'auto'); 

            try {
                const response = await fetch('http://localhost:5000/process_wall', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.status === 'success' && result.points) {
                    // SUCCESS: Load the points into our editable array
                    points = result.points;
                    drawPoints(); // This will draw them with handles!
                    checkCompletion();
                    message.innerText = 'Detection done! Drag red circles to adjust.';
                } else {
                    message.innerText = 'Auto-detect failed. Please click manually.';
                }
            } catch (error) {
                console.error(error);
                message.innerText = 'Server Error.';
            }
        });

        confirmButton.addEventListener('click', async () => {
            if (points.length !== 4) return;
            message.innerText = 'Processing warp and texture...';

            const formData = new FormData();
            formData.append('image', currentFile);
            formData.append('wall_name', wallSelect.value);
            formData.append('points_mode', 'manual'); // We always send as manual now because we might have edited the auto points
            formData.append('points_data', JSON.stringify(points)); 

            try {
                const response = await fetch('http://localhost:5000/process_wall', { method: 'POST', body: formData });
                const result = await response.json();

                if (result.status === 'success') {
                    message.innerText = `Saved ${result.filename}! Upload next wall.`;
                    // Move to next wall in dropdown
                    if (wallSelect.selectedIndex < wallSelect.options.length - 1) {
                        wallSelect.selectedIndex++;
                    }
                    resetPoints();
                } else {
                    message.innerText = 'Error processing wall.';
                }
            } catch (e) {
                console.error(e);
                message.innerText = 'Network Error.';
            }
        });

        resetButton.addEventListener('click', () => {
            resetPoints();
            drawImage();
        });

        function resetPoints() {
            points = [];
            confirmButton.style.display = 'none';
            autoDetectButton.style.display = 'block';
            updatePointListUI();
            message.innerText = 'Ready.';
        }
</script>
