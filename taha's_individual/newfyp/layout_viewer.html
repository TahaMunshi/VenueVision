<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>3D Layout Viewer - Debug Mode</title>
    <style>
        body { margin: 0; background-color: #222; overflow: hidden; }
        canvas { display: block; }
        #message { 
            position: absolute; top: 10px; width: 100%; text-align: center; 
            color: #fff; font-family: sans-serif; pointer-events: none; 
            font-weight: bold; text-shadow: 2px 2px 2px #000;
        }
        #legend {
            position: absolute; bottom: 10px; left: 10px; 
            background: rgba(0,0,0,0.7); color: white; padding: 10px;
            font-family: sans-serif; font-size: 12px; pointer-events: none;
        }
        #refresh-btn {
            position: absolute; top: 10px; right: 10px;
            background: #ff4444; color: white; border: none;
            padding: 10px 15px; cursor: pointer; font-weight: bold;
            border-radius: 5px; z-index: 1000;
        }
        #refresh-btn:hover { background: #ff6666; }
    </style>
</head>
<body>
    <div id="message">Initializing Debug View...</div>
    <button id="refresh-btn" onclick="forceRefresh()">Force Reset</button>
    <div id="legend">
        <strong>Debug Legend:</strong><br>
        <span style="color: #ff3333">■ Red Box</span> = Target Size (From Planner)<br>
        <span style="color: #ffffff">■ Model</span> = The actual 3D Asset
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // Force refresh function - clears cache and reloads
        function forceRefresh() {
            // Clear all session storage
            sessionStorage.clear();
            // Force reload with cache bypass
            const url = new URL(window.location.href);
            url.searchParams.set('v', Date.now());
            window.location.href = url.toString();
        }
        
        // Auto-add cache buster on page load if not present
        if (!window.location.search.includes('v=')) {
            const url = new URL(window.location.href);
            url.searchParams.set('v', Date.now());
            if (window.history.replaceState) {
                window.history.replaceState({}, '', url.toString());
            }
        }
        
        // --- 1. CONFIGURATION ---
        const defaultDims = { width: 20, height: 8, depth: 20 };
        const storedDims = JSON.parse(sessionStorage.getItem('roomDimensions') || JSON.stringify(defaultDims));
        const ROOM_WIDTH = storedDims.width;
        const ROOM_HEIGHT = storedDims.height;
        const ROOM_DEPTH = storedDims.depth;

        // --- 2. SETUP SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333333);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, ROOM_HEIGHT * 2, ROOM_DEPTH + 5); // High angle view

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        // --- 3. HELPER FUNCTIONS ---

        // Creates the grey room box
        function createRoom() {
            const materials = [
                new THREE.MeshBasicMaterial({ color: 0x999999, side: THREE.BackSide }), // Right
                new THREE.MeshBasicMaterial({ color: 0x999999, side: THREE.BackSide }), // Left
                new THREE.MeshBasicMaterial({ color: 0xaaaaaa, side: THREE.BackSide }), // Top
                new THREE.MeshBasicMaterial({ color: 0x444444, side: THREE.BackSide }), // Floor
                new THREE.MeshBasicMaterial({ color: 0x999999, side: THREE.BackSide }), // Front
                new THREE.MeshBasicMaterial({ color: 0x999999, side: THREE.BackSide })  // Back
            ];
            const geometry = new THREE.BoxGeometry(ROOM_WIDTH, ROOM_HEIGHT, ROOM_DEPTH);
            const room = new THREE.Mesh(geometry, materials);
            room.position.y = ROOM_HEIGHT / 2;
            scene.add(room);

            // Grid helper on the floor
            const grid = new THREE.GridHelper(Math.max(ROOM_WIDTH, ROOM_DEPTH), Math.max(ROOM_WIDTH, ROOM_DEPTH));
            scene.add(grid);
        }

        // Creates the RED DEBUG BOX showing where the item *should* be
        function createDebugBox(width, depth) {
            const geometry = new THREE.BoxGeometry(width, 0.1, depth); // Flat box representing footprint
            const material = new THREE.MeshBasicMaterial({ 
                color: 0xff0000, 
                wireframe: true,
                transparent: true,
                opacity: 0.5
            });
            return new THREE.Mesh(geometry, material);
        }

        // Forces a model to fit inside a specific width/depth
        function normalizeAndScaleModel(modelScene, targetWidth, targetDepth) {
            // 1. Get original size
            const box = new THREE.Box3().setFromObject(modelScene);
            const size = new THREE.Vector3();
            box.getSize(size);
            const center = new THREE.Vector3();
            box.getCenter(center);

            // 2. Center the model at (0,0,0) locally
            modelScene.position.sub(center);

            // 3. Parent wrapper for scaling
            const wrapper = new THREE.Group();
            wrapper.add(modelScene);

            // 4. Calculate Scale
            // Default to 1 if size is 0 to avoid errors
            const scaleX = size.x > 0 ? targetWidth / size.x : 1;
            const scaleZ = size.z > 0 ? targetDepth / size.z : 1;
            
            // Use the smaller scale for height to keep it looking somewhat normal, 
            // or just use X to match width. Let's use X.
            const scaleY = scaleX; 

            wrapper.scale.set(scaleX, scaleY, scaleZ);

            // 5. Lift up to sit on floor
            // The model is centered on Y=0, so half is below. We lift by (height * scale / 2)
            wrapper.position.y = (size.y * scaleY) / 2;

            return wrapper;
        }

        // --- 4. MAIN LOAD LOGIC ---
        function loadAssets() {
            const layoutData = sessionStorage.getItem('currentLayout');
            if (!layoutData) {
                document.getElementById('message').textContent = "No layout data found. Run Planner first.";
                return;
            }

            const assets = JSON.parse(layoutData);
            const gltfLoader = new THREE.GLTFLoader();

            document.getElementById('message').textContent = `Visualizing ${assets.length} assets...`;

            assets.forEach(asset => {
                // CALC POSITION:
                // Planner (0,0) is Top-Left. ThreeJS (0,0) is Center.
                // Asset X (Planner) + Half Width = Center X (Planner)
                // Center X (Planner) - Half Room Width = World X
                const centerX2D = asset.x + (asset.width / 2);
                const centerY2D = asset.y + (asset.depth / 2);
                
                const worldX = centerX2D - (ROOM_WIDTH / 2);
                const worldZ = centerY2D - (ROOM_DEPTH / 2);

                // 1. Create the Main Group for this object
                const group = new THREE.Group();
                group.position.set(worldX, 0, worldZ);
                
                // 2. Add DEBUG BOX (The Red Wireframe)
                // We create a box of the target size.
                // Note: The Debug Box is NOT rotated yet, it rotates with the group.
                const debugBox = createDebugBox(asset.width, asset.depth);
                // Lift debug box slightly so it doesn't z-fight with floor
                debugBox.position.y = 0.05; 
                group.add(debugBox);

                // 3. Load the Actual Model (with cache busting)
                const cacheBuster = asset.file.includes('?') ? '&' : '?';
                const timestamp = Date.now();
                const random = Math.random().toString(36).substring(7);
                gltfLoader.load(asset.file + cacheBuster + 't=' + timestamp + '&r=' + random, (gltf) => {
                    
                    // Scale and Normalize the model to fit the dimensions
                    const scaledModel = normalizeAndScaleModel(gltf.scene, asset.width, asset.depth);
                    
                    group.add(scaledModel);

                }, undefined, (err) => {
                    console.error("Failed to load", asset.file, err);
                });

                // 4. Apply Rotation to the whole group (Model + Debug Box)
                group.rotation.y = -asset.rotation * (Math.PI / 180);

                scene.add(group);
            });
        }

        // --- 5. RUN ---
        createRoom();
        loadAssets();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
