<!DOCTYPE html>
<html>
<head>
    <title>3D Asset Viewer</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/PLYLoader.js"></script>

    <script>
        // 1. Setup scene, camera, renderer, controls
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333333);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3;

        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        // 2. Add lights (PLY models need lights to be visible)
        const ambientLight = new THREE.AmbientLight(0x404040, 2); // Soft white light
        scene.add(ambientLight);
        
        const pointLight = new THREE.PointLight(0xffffff, 2); // Bright white light
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // 3. Setup the PLY Loader
        const loader = new THREE.PLYLoader();
        const cacheBuster = "?v=" + Date.now(); // Cache buster
        
        loader.load(
            'new_asset.ply' + cacheBuster, // The file we generated
            function (geometry) {
                // This function runs when the model is loaded
                
                geometry.computeVertexNormals(); // Helps with lighting
                
                // Create a standard material
                const material = new THREE.MeshStandardMaterial({ color: 0xcccccc });
                
                const mesh = new THREE.Mesh(geometry, material);
                
                // Optional: Scale and position the mesh
                mesh.scale.set(0.5, 0.5, 0.5); // Make it a bit smaller
                mesh.rotation.x = -Math.PI / 2; // Rotate it to be upright
                
                scene.add(mesh);
            },
            // onProgress (optional)
            function (xhr) {
                console.log((xhr.loaded / xhr.total * 100) + '% loaded');
            },
            // onError
            function (error) {
                console.log('An error happened while loading the PLY file');
            }
        );

        // 4. Start render loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
