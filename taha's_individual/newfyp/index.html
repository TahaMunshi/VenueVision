<!DOCTYPE html>
<html>
<head>
    <title>3D Room Visualizer (Dynamic)</title>
    <style>
        /* CSS from previous version */
        body { margin: 0; background-color: #222; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-family: Arial, sans-serif;
            border-radius: 5px;
            line-height: 1.5;
            width: 250px;
        }
        .slider-group {
            margin-bottom: 8px;
        }
        input[type=range] {
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>Room Dimensions (Meters)</h3>
        <div class="slider-group">
            <label for="widthSlider">Width: <span id="widthValue">20</span> m</label>
            <input type="range" id="widthSlider" min="5" max="50" value="20" step="1">
        </div>
        <div class="slider-group">
            <label for="heightSlider">Height: <span id="heightValue">8</span> m</label>
            <input type="range" id="heightSlider" min="2" max="15" value="8" step="0.5">
        </div>
        <div class="slider-group">
            <label for="depthSlider">Length: <span id="depthValue">20</span> m</label>
            <input type="range" id="depthSlider" min="5" max="50" value="20" step="1">
        </div>
        <hr>
        <button onclick="saveAndGoToPlanner()" style="background-color: #007bff; color: white; width: 100%;">
            Save Dimensions & Go to 2D Planner
        </button>
        <p>Drag to look around the INSIDE of the venue</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enablePan = false; 
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- GLOBAL VARIABLES ---
        let roomMesh;
        const cacheBuster = "?v=" + Date.now();
        const loader = new THREE.TextureLoader();

        // 1. Load Textures
        const texture1_north = loader.load('texture_wall_1_north.jpg' + cacheBuster);
        const texture2_east = loader.load('texture_wall_2_east.jpg' + cacheBuster);
        const texture3_south = loader.load('texture_wall_3_south.jpg' + cacheBuster);
        const texture4_west = loader.load('texture_wall_4_west.jpg' + cacheBuster);
        
        // 2. Create Materials Array
        const materials = [
            new THREE.MeshBasicMaterial({ map: texture2_east, side: THREE.BackSide }),
            new THREE.MeshBasicMaterial({ map: texture4_west, side: THREE.BackSide }),
            new THREE.MeshBasicMaterial({ color: 0x888888, side: THREE.BackSide }),
            new THREE.MeshBasicMaterial({ color: 0x444444, side: THREE.BackSide }),
            new THREE.MeshBasicMaterial({ map: texture3_south, side: THREE.BackSide }),
            new THREE.MeshBasicMaterial({ map: texture1_north, side: THREE.BackSide })
        ];

        // 3. Initial Mesh Creation
        function createRoom(width, height, depth) {
            if (roomMesh) {
                scene.remove(roomMesh);
                roomMesh.geometry.dispose();
            }

            const geometry = new THREE.BoxGeometry(width, height, depth);
            roomMesh = new THREE.Mesh(geometry, materials);
            
            roomMesh.rotation.y = Math.PI / 2; // Orientation fix
            roomMesh.position.y = height / 2; // Centers the room mesh vertically

            scene.add(roomMesh);
        }

        // --- RESIZING LOGIC ---
        
        function resizeRoom() {
            const width = parseFloat(document.getElementById('widthSlider').value);
            const height = parseFloat(document.getElementById('heightSlider').value);
            const depth = parseFloat(document.getElementById('depthSlider').value);

            // Update UI text
            document.getElementById('widthValue').textContent = width;
            document.getElementById('heightValue').textContent = height;
            document.getElementById('depthValue').textContent = depth;

            // Update the room geometry
            createRoom(width, height, depth);

            // Set camera position to a human viewpoint (e.g., 1.7m)
            const viewpointHeight = Math.min(1.7, height / 2);
            camera.position.set(0, viewpointHeight, 0); 
            
            // Set target to look straight ahead
            controls.target.set(0, viewpointHeight, 1); 
            controls.update();
        }
        
        // 🔴 NEW: Persistence Function 
        function saveAndGoToPlanner() {
            const dimensions = {
                width: parseFloat(document.getElementById('widthSlider').value),
                height: parseFloat(document.getElementById('heightSlider').value),
                depth: parseFloat(document.getElementById('depthSlider').value)
            };
            
            // Save dimensions to Session Storage
            sessionStorage.setItem('roomDimensions', JSON.stringify(dimensions));
            
            // Redirect to the planner page
            window.location.href = 'planner.html';
        }

        // Initialize the room with default values
        resizeRoom(); 

        // Add event listeners to the sliders
        document.getElementById('widthSlider').addEventListener('input', resizeRoom);
        document.getElementById('heightSlider').addEventListener('input', resizeRoom);
        document.getElementById('depthSlider').addEventListener('input', resizeRoom);


        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth / window.innerHeight);
        }, false);
    </script>
</body>
</html>
